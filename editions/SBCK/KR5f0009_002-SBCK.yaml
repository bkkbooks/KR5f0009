front:
  text: 鶡冠子卷中
  hash: sha256:2dabe7de11c8660785c81bee44da675fe8c7f4f0704a62223ef77c9dacfa65a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5f0009_SBCK_002-1a}
body:
  text: 陸佃觧度萬第八龐子問鶡冠子曰聖與神謀子曰道不同不相為謀道與人成子曰苟非其人道不虗行願聞度神慮成之要柰何鶡冠子曰天者神也地者形也地濕而火生焉至陽赫赫赫赫出乎地天燥而水生焉至隂肅肅肅肅出乎天法猛刑頗則神濕刑與法隂也神濕則天不生水音故聲倒則形燥聲與音陽也形燥則地不生火水火不生則隂陽無以成氣度量無以成制五勝無以成埶一作埶五勝五行之勝萬物無以成百業俱絶萬生皆困濟濟混混孰知其故天人同文地人同理天文地理與人同焉賢不肖殊能故上聖不可亂也譬如堯舜共工驩兠欲與為惡則誅之下愚不可辯也譬如桀紂龍逄比干欲與為善則誅之隂陽者氣之正也天地者形神一無神字之正也聖人者徳之正也法令者四時之正也季春行冬令則寒季秋行夏令則暖故一義失此萬或亂彼所失甚少所敗甚衆所謂天者非是蒼蒼之氣之謂天也所謂地者非是膞膞之土之謂地也膞形埒地所謂天者言其然物而無勝者也言天者君道也可天下之物而莫之勝也所謂地者言其均物而不可亂者也言地者臣道也平天下之物而莫之亂也音者其謀也雜比為謀聲者其事也布散為事音者天之三光也三光雜比於上聲者地之五官也五官布散於下形神調則生理脩形不病燥神不病濕則生理脩矣夫生生而倍其本則徳或作專巳夫偏養其本至於過理而不及㑹通之適則自爲太多其徳失乎物矣豈足語衛生之經哉故曰善養生者牧羊然視其後者而鞭之一本元缺一本字或作知或作如知無道上亂天文下㓕地理天人同文地人同理於此見矣中絶人和治漸終始言其治漸首末而巳失中道也故聴而無聞視而無見天下之事壞於白晝而闇日中見斗之義有義而失謚人之所有不能謚之失謚而惑責人所無必人所不及逺其途而誅不至也相史於旣而不盡其愛史使也從省言不盡巳之愛而責人之盡相區於成而不索或作營其實區驅也從省言不竭巳之忠而望人之成虗名相髙精白爲黒沽於虗名而變亂事實黒或爲墨墨亦黒也詩曰䝖貍而蒼墨以爲明動靜組轉與物轉旋如組使之神絶復逆復有報乎上也逆有言乎上也言其神色距人於千里之外經氣不形離正名書曰有形有名形也者物此者也名也者命此者也經氣失常故形不麗名五氣失端四時不成隂陽并毗四時不至寒暑之和不成過生於上罪死於下有世將極驅馳索禍其於禍也驅車就之開門逃福其於福也若開門避之賢良為愚者為國天咎先見菑或作嗇亦或作害並雜人執兆生孰知其極見形而巳昧於在理見日月者不為明聞雷霆者不為聦事至而議或作義者不能使變無生不能消之於未萌故善度變者觀本本足則盡不足則徳必薄兵必老其執能以材為襃徳或作襄愽義者㢤其文巧武果而姦不止者生於本不足也言非少文不武之罪故主有二政臣有二制臣弗用主不能使臣必死主弗能止是以聖王獨見故主官以授長者在内和者在外夫長者之爲官也在内則正義在外則固守用法則平法人本無害以端天地令出一或無一字原多門杜矣散無方化萬物萬物作無物者令也守一道制萬物者法也法也者守内者也法者守於分域之内令也者出制者也令者所以行法夫法不敗是是出於義變而不可常法者所以趣變令不傷理主出於理一而不可變令者所以守法故君子得而尊小人得而謹胥或作冐靡得以全神備於心道備於形備天地之羙稱神明之容人以成則以成法則士或作土以爲繩以爲繩墨列或作削時第氣以授當名故法錯而隂陽調鳳凰者鶉火之禽或無鶉火之禽玄枵之獸字陽之精也雄曰鳯凰者其雌也鶉火南星之次也騏麟者玄枵之獸隂之精也牝曰騏麟者其牡也玄枵北星之次也騏似麟而無角萬民者徳之精也徳能致之或作駿其或無其字精畢至龐子曰致之柰何鶡冠子曰天地隂陽取稽於身故布五正以司五明五正見下五明宜謂名尸氣皇名尸神明名尸賢聖名尸后二名尸公伯十變九道未詳聞也稽從身始五音六律稽從身出大禹以聲為律以身為度所謂取稽於身者耶五五二十五以理天下五五五其音之五也六六三十六以為式六六六其律之六也一歳之式積旬三十有六氣由神生道由神成蛻氣之謂虗蛻虗之謂道而神也者有而非氣也無而非道也非氣而氣以之生非道而道以之成唯聖人能正其音調其聲故其徳上反太清太清天也下及㤗寧㤗寧地也中及萬靈膏露降白丹發醴泉出醴泉其味如醴可以養老朱草生朱草可以染絳以别尊卑衆祥具傳曰王者綂和隂陽休氣充塞符瑞並臻應徳而至徳至天則斗極明日月光甘露降徳至地則嘉禾生萓莢起秬鬯出徳至文表則景星見五緯順徳至草木則朱草生木連理徳至鳥獸則鳯凰翔鸞鳥舞騏麟臻白虎到白雉降白鹿見白烏下徳至山陵則景雲出芝實茂陵出異丹阜出萐莆山出器車澤出神鼎徳至淵泉則黄龍見醴泉涌河出龍圖洛出書江出大貝海出明珠徳至八方則祥風至嘉氣時鍾律調音度施四夷化越裳貢故萬口云或作去帝制神化衆祥備至則外帝内神之道具矣景星光潤景星者徳星也其狀無常常出於有道之國而月死則見所以助月照民夜績也文則天下之兵武則天下之兵莫能當一本云武則天下莫能當無之兵字逺之近顯乎大乎小衆乎少莫不從微始故得之所成不可勝形失之所敗不可勝名或作勝為名從是徃或作生者子弗能勝問吾亦弗勝言凡問之要欲近知而逺見以一度萬也無欲之君不有官治者道於本教治者脩諸巳因治者不變俗事治者矯或作橋之於末龐子曰願聞其事鶡冠子曰神化者定天地豫或作象四時其體常如此㧞或作教隂陽移寒暑其體變如此傳曰古之真人提挈天地把握隂陽正流並生萬物無害萬成或作咸全名尸氣皇伏羲氏得之以襲氣母盖近是乎官治者師隂陽隂陽王事之本應將然神化者於未有故升此一等地寧天澄衆羙歸焉名尸神明教治者置或作署四時春誦夏弦秋學禮冬讀書之因時順氣於功易也事功順道俯而事功仰以順道名尸賢聖因治者招或作拓賢聖而道心術敬事生和名尸后王事治者招仁聖而道知焉不能招賢聖而招仁不能道心術而道知聖也者天道也賢也者地道也仁也者人道也苟精牧神苟急敕也牧驅制也分官成章精神勞矣而不能善遍於是又備官焉教苦利逺教雖苦而利逺法制生焉萬物擾擾自此起矣法者使去就公法者將以有所去也非以有所取也同知壹䜘有同由者也非行而使人合同者也故至治者弗由而名尸公伯公如公侯之公伯如霸王之伯王鈇第九龐子問鶡冠子曰泰上成鳩一作鴡之道一族用之萬八千傳曰天地初立天皇一曰天靈其治萬八千然則成鳩蓋天皇之别號也有天下兵強世不可奪天地立豈容巳有兵哉此言亦筌蹄也南華曰寓言十九重言十七與天地存乆絶無倫無倫細之至也中庸曰毛猶有倫齊殊異之物齊鵬鷃之大小等鳬鶴之長短不足以命其相去之不同也言其懸絶如此世莫不言俗立化彼獨何道之行以至於此鶡冠子曰彼成鳩氏天句故莫能増其高尊其靈龐子曰何謂天何若而莫能増其髙尊其靈凡此叩其所以鶡冠子曰天者誠其日徳也日或無日字誠出誠入南北有極冬日至而北夏日至而南故莫弗以為法則取中於日徳天者信其月刑也月信死信生終則有始朔而後魄生望而後魄死故莫弗以為政取正於月刑天者明星其稽也明星大星也二十八舎之列或作削星不亂各以序行故小大莫弗以章小星不見陵天者因時其則也四時當名代或作伐而不干或作于彼謝此代而無侵越故莫弗以為必然天者一法其或無其字同也前後左右古今自如柰何杞人之憂其崩墜也故莫弗以為常天誠信明因一誠誠其日徳信信其月刑明明星其稽因因時其則一一法其同不為衆父或作文為衆父父易一故莫能與爭先南華曰一而不可不易者道也先或為光易一非一一不足以囿之故不可尊增成鳩得一故莫不仰制焉所謂侯王得一爲天下貞者也龐子曰願聞其制鶡子曰成鳩之制與神明體正神明者下䆒而上際沉以窮乎下浮以際乎上克嗇萬物而不可猒者也周泊或作汩或作流徧照周泊無外也徧照無裏也反與天地總故能爲天下計狂而不反豈能與民同吉凶之患㢤明於蚤識逄曰或作逺白不惑存亡之祥安危之稽龐子曰願聞其稽鶡子曰置下不安句上不可以載或作可以載累其足或作是也其最髙而不植局或作不可植局者未之有也此譬安危之稽言其置下苟危難欲累於上難矣又况又在其上者乎則其所立豈有不局哉累足也植立也局曲也辯於人情䆒物或作萬物之理稱於天地稱之為言量也廢置不殆或作佁或作治審於山川而運動舉錯有檢蠢迪檢柙生物無害為之父母無所躒仁於取予備於教道教以為人道以為巳要於言語直言曰言問難曰語信於約束巳諾不專反諾為巳禮曰與其有諾責也寧有巳怨喜怒不增喜不過予怒不過奪其兵不武以為俗其化出此龐子曰願聞其人情物理所以嗇萬物與天地總與神明體正之道鶡冠子曰成鳩氏之道未有離天曲日術者天曲者明而易循或作脩也日術者要而易行也天曲若五家為伍五郷為縣之日術家里用提甸長用旬之此法起於周之末造而曰成鳩用之是今日適越而昔至也然則此書寓言多矣龐子曰願聞天曲日術鶡子曰其制邑或作巳理都使矔習者五家為伍伍為之長十伍為里里置有司四里為扁扁當為甸後皆放此扁為之長十扁為鄕鄕置師五郷為縣縣有嗇夫治焉十縣為郡有大夫守焉命曰官屬郡大夫退脩或皆作循其屬縣嗇夫退脩其郷郷師退脩其扁扁長退脩其里里有司退脩其伍伍長退脩其家事相斥正居處相察出入相司司猶伺也父與父言義子與子言孝與或為為長者言善少者言敬旦夕相薫薌以此慈孝或作力之務有所移徙去就家與家相受人與人相付亡人姦物無所穿竄此其人情物理也伍人有勿或作物一本無伍人有勿四字故不奉上令有餘不足居處之狀此言有餘不足居處之狀無故違上令當告有司而不輙以告里有司謂之亂家其罪伍長以同同謂同坐伍人之罪里中有不敬長慈少出等異衆不聴父兄之教有所受聞不悉以告扁長謂之亂里其罪有司而貳其家其人為首其家為貳貳猶副也若今從坐扁不以時循或作脩行教誨受聞不悉以告郷師謂之亂扁其罪扁長而貳其家郷不以時循行教誨一二教之曰誨受聞不悉以告縣嗇夫謂之亂郷其罪郷師而貳其家縣嗇夫不以時循行教誨受聞不悉以告郡善者不顯命曰蔽明見惡而命曰下比謂之亂縣其誅嗇夫無赦不言貳其家者罪之尚貳其家則誅可知矣郡大夫不以循行教誨受聞雖實或作賔有所遺脫不悉以教柱國謂之亂郡其誅郡大夫無赦柱國不政使下情不上聞上情不下究謂之絿或作絯或作繆政絿急也其誅柱國㓕門殘疾令尹不宜或作宣時合或作令地合地之徳害百姓者謂之亂天下其軫令尹以狥柱國楚之寵官令尹若相國矣楚懐王使柱國昭陽將兵政齊陳軫問楚國之法破軍殺將者何以貴之昭陽曰其官為柱國封土執圭軫曰其有貴於此乎曰令尹軫車裂也周官曰轘軫或作斬此其所以嗇物也天用四時地用五行天子執一以居一作守中央叅於兩間調以五音正以六律紀以度數宰以刑徳從本至末第以甲乙天始於元地始於朔元以氣言之朔以方言之天運始於玄元地處始於玄朔四時始於歷王者敬授人時實始於歷故家里用提提零日也公羊傳曰提月者僅逮此月晦日也扁長用旬郷師用節驚蟄芒種之縣嗇夫用月郡大夫用氣分所至二分二至之柱國用六律里五日報扁用提扁十日報郷用旬郷十五日報縣用節縣三十日報郡用月郡四十五日報柱國用氣柱國六十日以聞天子用律天子七十二日遣使一本作遣使於郡此用五行分王之數盖一之運五行各王七十二日勉有功罰不如句此所以與天地總下情六十日一上聞上惠七十二日一下䆒此天曲日術也故不肖者不失其賤而賢者不失其明上享或作序其福禄而百事理行畔者不利天下晏然雖隂有欲畔者無所乗其隙也故莫能撓其強是以能治滿而不溢不増之使溢綰大或作天而不芒不損之使芒芒之為言小也天子中或作削職一本作則織三則或作典不赦治不踰官使史李不誤公市為平生者不喜非故生之死者不怨非故殺之人得所欲國無變故著賞有功徳及三世父或作名伏或作狀其不得創謚名之曰幽厲雖孝子慈孫不䏻改也創或為制事從一二終古不勃彼計為善於郷不如為善於里為善於里不如為善於家是以為善者可得舉為惡者可得誅或作諭莫敢道一旦之善皆以終身為期素無失次故化立而世無邪化立俗成少則同儕或作齊長則同友逰敖同品祀同福死生同愛禍災同憂居處同樂安居曰處行作同和吊賀同雜泣同哀驩欣足以相助諜或作謀足以相止探遉也諜間諜也安平相馴軍旅相保夜戰則足以相信晝戰則足以相配或作醜入以禁出正無道是以其兵能横行誅伐而莫之敢禦故其刑設而不用不爭而權重車甲不陳而天下無敵矣一本作天下無道適矣失道則賤敢逆貴不義則小敢侵大成鳩旣見上世之嗣失道亡功倍或作信本㓕徳之則故為之不朽或作株又或作採之國定位牢或作罕祭或作然不能保其家則位不定矣不能保其宗廟則祭不牢矣使神亶曰或作日増䂓不圎益矩不方此言法度至足無欠無餘䂓不可増矩不可益非特使人信之雖質諸神而無疑也盖聖人之法譬諸身乎増之則贅割之則夫以効末傳之子孫唯此可持或無唯此可持字唯此可將効猶示也讀如効犬効羊之効言以示子孫之末裔立而可持行而可將唯此而巳將者養吉釋或作澤者不祥墠以全犧純謂之犧完謂之牷正以齋明齋或作天或作文不莫謂之齋不眛謂之明齋明者蓋祀之正也犧牷則以為副而巳禮曰去廟為祧去祧為壇去壇為墠今此獨言墠者於墠如此則由壇而上可知也四時享之祀以家王子孫祭祀不輟所謂祀以家王以為神享禮靈之符藏之宗廟以璽正諸或作諸侯為之信符藏之宗廟而又以其璽正之以明後世所當守也故其後世之保教也全句耳目不營用心不分不見異物而遷捐或作指去毒或作也捐巳之私去人之毒鉤此字上有毎字一本鉤作均於内哲或作埑智足以及之固於所守仁足以守之更始逾新周而更始文而愈新上元為紀共承嘉惠相髙不改亶昭穆湯不先契文武不先不窋魯躋僖公失是矣具或作其招士疑先結之後入弗觧先入者定矣故後入之事弗能觧也此知極之至也極如紀極之極龐子曰願聞所以不改更始逾新之道鶡冠子曰成鳩所謂得王鈇之傳者也龐子曰何謂王鈇鶡冠子曰王鈇者非一世之器也以死遂生以殺止殺從中制外之教也教或為數後世或作世後成至孫一靈羽靈或作虗理或作理虗羽理或作虗村理符日循或作脩功弗敢或無敢字敗智者雖工弗敢敗也奉業究制執正守内拙弗敢廢愚者雖拙弗敢廢也樓與旱蘇本作樓與卑疑旱或為早以新續故四時執効應錮或作銅不駿疑后得入廟惑惑作或爽或作不嗣或作副謂之焚或作婪生火甚多其和焚矣列子曰焦然肌色奸黯昏然五情爽惑祖命冐世冐忝也世如世徳之世禮嗣弗引奉常弗内弗引弗引於朝弗内弗内於廟奉常禮官也典宗朝之儀有丞景帝更曰太常靈不食祀其不得食祀家王不舉祭天將降咎皇神不享家王越而祭之則將罪於天皇神雖郊不享皇神昊天上帝此所以不改更始逾新之道也故主無異意人君爽惑不嗣其罪如上所云則其後者據舊鍳新豈敢輙異哉民心不徙與天合則句萬年一范范如荀子范形之范則近者親其善逺者慕其徳而無巳是以其教不猒其用不弊故能疇合四海以為一家而夷貉萬國皆以時朝服致績或作續而莫敢効増或作増免此言夷貉萬國皆以朝服致貢而不敢輒増亦不敢免法言曰我純績帶我金犀此之謂也聞者傳譯來歸其義义其逺者莫能易其俗移其教孟子所謂用夏變夷未聞變於夷者也故共威立而不犯流逺而不廢此素皇内帝或作耑之法帝者天號王者人稱皇者天人之總羙大之名謂之素皇内帝則又其至者也盖至人神矣由是而在下則玄聖外王之道也由是而在上則素皇内帝之法也成鳩之所枋以超等枋柄也世世不可奪者也功日益月長故能與天地存乆此所以與神明體或作禮正之術也不待士史或作女蒼頡作書故後世莫能云其咎士李官也太古無法而治不立十史不造書契而至徳玄同使由之者不能知知之者不能名尚何議其咎也㢤傳曰蒼頡作書鬼夜哭天雨粟方是之時至徳衰矣未聞不與道徳䆒䆒下或有謂字而能以為善者也龐子曰如是古今之道同邪鶡冠子曰古者亦我而使之乆衆者亦我而使之衆耳何比異哉彼善則萬世不忘猶聚也道惡則禍及其身尚或作有奚怪焉龐子曰以今之事觀古之道舟車相通衣服同采言語相知畫地守之不能相犯殊君異長不能相使逆言過耳兵甲相李或作履李如李官之李李者治也百父母子旦或作其未易領或作頃言父母暨子至百不易領矣方所言未有離中國之正也離附也言以上所云方若疇合四海以為一家之言似違中國之正逺矣丘第之業第里第也域或作或不出著著土著也居不連垝毁墻曰垝而曰成鳩氏周闔四海爲一家夷貉夷貉或作第却萬國莫不來朝其果情一本情下有可字一本情作成乎此言丘里之間其業之異如此又况四海夷貉之逺乎鶡冠子曰虎或作唐狼殺或作救人或作下烏蒼從上螾蛾一作蟻從下聚之烏烏鳥也蒼蒼蠅也六者異然同時俱至者何也所欲同也由是觀之有人之名則同人之情耳何故不可乎此言四海之情同以爲一家無不可者天度數之而行在一不少在萬不衆同如林木積如倉粟斗石以陳升委無失也委亦米之數也傳曰少曰委多曰積其數未詳聞也禮云出入三積列或作削地分民亦尚一也耳或無耳字百父或作交母子何能増减殊君異長又何出入若能正一萬國同極徳至至下或有制字四海又奚足闔也龐子曰果必信然隂陽消散三百六十日各反或作及其故天地跼跼或作奚足以疑跼跼挾貌孟子所謂天之高也星辰之逺也苟求其故千之日至可坐而致也聖人高大内揣深淺逺近之理或作異使神一失一失失其奥也此言聖人燭理有以窺之不復息矣運而不停與或作為天地相蔽蔽天地而不耻至今尚在以鉦靣逹行疑宜乎哉成鳩之萬八千也夫道者天地之母縮而修身伸以治國皆可以長乆此廣成千之所以千二百年而成鳩氏之所以萬八千也故曰廣成子之謂天矣又曰成鳩氏天故莫能増其髙尊其靈得此道者何辯誰氏所用之國而天下利耳用之則是安辯誰何㤗鴻第十泰一者㤗一天皇大帝也執大同之制制或作利泰一無所不同故曰執大同之制楚人忘弓未能忘楚孔子曰惜㢤其未大也調泰鴻之氣泰一含元氣者故曰調太鴻之氣鴻蒙元氣也㤗鴻元氣之始也正神明之位者也南華所謂天尊地卑神明之位故九皇受傅受教於傅以索其然之所生傅謂之得天之解或作天然之解不與法縛不求法脫傅謂之得天地之所始生天生地傅謂之道得道之常不妄日常傅謂之聖人聖人之道與神明相得故曰道徳徳者得此者也郄始窮郄者開也有然後有始列子曰太易者未見氣也太者氣之始也太始者形之始也太素者質之始也太一至矣其地蓋處太易太素之間故曰郄始窮之得齊之所出帝出乎震齊乎巽而太一者郄始窮得齊之所出故能北辨而南與萬物相見一九皇殊制而政莫不効焉故曰㤗一㤗一者無適而非一也故九皇殊制而不能二也泰皇問泰一曰天地人事三者孰急泰皇蓋九皇之長也泰一曰愛精養神内端者所以希天内直者與天為徒天也者神明之所根也醇化四時陶埏無形埏和土也刻鏤未萌木曰刻金曰鏤凡此亦皆自然也夫豈物刻而雕之離文或作父將或作特然者也離華離也天道造始而地事終之故其言如此地者承天之演備載以寧者也吾將告汝神明之極天地人事三者復一也立置臣義此將從體起用和同天人之際使之無間故先建立君臣之義所謂四則四則即上所云謂之得天之解謂之得天地之所始謂之得道之常謂之聖人散以八風東方曰明庻風西方曰閶闔風西南曰凉風東北曰融風之散謂散上四則他皆放此揆以六合揆言總之六合之内也事以四時寫以八極寫言放之八極之外也照以三光牧或作以刑徳調以五音正以六律分以度數表以五色改以二氣亭之以温凉毒之以寒暑致以南北南北謂日齊以晦望晦望謂月受以明歴或作暦暦謂日月星辰盖四則至矣而其道無乎不在在此爲此在彼爲彼故八風得以散六合得以揆四時得以事八極得以寫三光得以照五音得以調六律得以正刑徳得以牧度數得以分五色得以表二氣得以改南北得以致晦望得以齊明歷得以受然則道之所在於彼乎於此乎其亦無所不在乎故曰天地人事三者復一也日信出信入南北有極度之稽也此申致以南北之義冬至日在牽牛夏至日在東井其長短有度月信死信生進退有常數之稽也此申齊以晦望之義二五而盈三五而闕其損益有數列星不亂其行代而或作以不干位之稽也此申受以明歷之義五位二十八舎各有常次天明三以定一義見下文則萬物莫不至矣或作以三時生長一時煞刑四時而定天地盡矣此言方其生長則三不後於一方其投刑則一不後於三以明三極之道莫知其孰急也夫物之始也傾傾或作鴻鴻傾傾未正之貌至其有也録録未能㧞於常流之中故曰録録至其成形端端王王端端傾傾之反王王録録之反勿或作物損勿益㓜少隨足各隨其性而足無事於老以從師俗仰以從於師俯以從於俗毋易天生毋散天樸自則清動之則濁人心譬如槃水莫動則平不撓則清微風過之則不可以得水形之正矣神聖踐承翼之位承翼之位盖天位也前後曰承左右曰翼也以與神皇合徳五精之帝謂之神后則神皇盖昊天也按圖正端以至無或作天極兩治或作四致两致上下察也四致普遍四方也間以止或作上息隨縁越感無所不周如上所謂可謂至矣然而動息則靜語息則嘿豈常離此寂然之地㢤歸時離氣以成萬業離附也取譬言之借如五精之指其道各遍五方而太昊司春少昊司秋者所以歸時離氣以成萬業也一來一徃視衡仾仰彼來此徃而仾仰視車之衡所以同乎人也禮曰國君綏視大夫衡視又曰執天子之器則上衡國君則平衡大夫綏之或曰衡如權衡之衡衡之仾仰應物而巳何所容其心㢤五官六府分之有道無鉤無繩渾沌不分曲者不以鉤直者不以繩而渾沌全矣故曰擢六律塞師曠之耳散五采膠離朱之目毁絶鉤䋲儷工倕之指而天下人始舎其樸矣大象不成事無經法精神相薄乃傷百族此明渾沌之不可判也盖偽生真死而渾沌判矣則精神相戰百族為之不寜南華曰上倍日月之明下爍山川之神盖謂是乎偷氣相或為祖時後功可立盗隂陽之和以載其形而還以相時先定其利待物自至不迎素次以法物至輙合法者天地之正器也用法不正玄徳不成所謂亂天之經逆物之情玄天弗成上聖者與天地接句結六或作交連而不解者也六連六合也老子曰善結者無䋲約而不可解是故有道南靣執政以衛神明左右前後靜侍或無侍字中央此言君無為也而臣亦無為也開原流洋洋若今海之有洋也精微徃来傾傾繩繩或作鴻鴻繩繩傾傾側貌繩繩正貌内持以維外紐以綱或作經行以理執或作執紀以終始同一殊職聮之使同綂之使一立為明官五范五范五音也義見下文四時各以相從昧或作味玄生色春夏之華發於玄冬音聲相衡衡平也東方者萬物立止焉或作東方生物圖揭立止焉止猶植也故調以徴南方者萬物華羽焉故調以羽西方者萬物成章焉故調以商北方者萬物録臧焉故調以角徴屬南方而今此言於東方者盖言以調東方而巳非謂分配東方也下皆放此中央者太一之位北極天地之中而其一明者太一之座百神仰制焉故調以宫道以為先夫道至矣而更推以為先記曰夫禮必本於太一分而為天地轉而為隂陽舉載神明華天上揚或作華物天上疑此樂章之名盖若皇華折揚也本出黄鍾所始為東方萬物唯以木華物天下盡木也使居東方主春以火照物天下盡火也使居南方主夏以金割物天下盡金也使居西方主秋以水沉物天下盡水也使居北方主冬上為大都天下盡土也使居中央守地天下盡人也以天子為正此言太一司天而分任五方又以天子治之調其氣調其五行之氣木藴金清之和其味和其五行之味水鹹火苦之聴其聲火焦金殺之正其形木圎土方之迭徃觀今或作令故業可循或作修也天下一致來不異古徃不異今却而觀之則其業可循近迭篇曰師未發軔而兵可迭也盖前却曰迭首尾易靣或作白春夏先秋冬後其方各有向焉何可易也地理離經天之首尾易向則地理亦失其經奪愛令亂奪其所欲而亂盖天序易於上地理離於下則人其有不亂者乎上㓕天文理不可知天文㓕矣地理安可知也故曰文理相明者也神明矣或作夫從或作徒文或作父理者相明者也色味者相度者也藻華者相成者也對質曰藻對實曰華藻文也藻如草之藻華如木之華衆者我而衆之故可以一范請也請如請益之請盖衆者自我而千萬則其一之亦在我矣請以一范無不可者順愛之政殊相或作未通列子曰虎之與人異而媚養巳者順也逆愛之政同相亡傳曰焉知父子不為豺狼故聖人立天為父建地為母范或作危者非務使云必同知一期或作明以使一人也氾錯之天地之間而人人其和或作人其和此言聖人盖知一期以使一人而惟是心焉汜錯之天地之間而人人其和也非務使之必同故曰一人之情千萬人之情是也和也者無形而有味者也和者道也盖道理形而有味同和者仁也與道同和相容或作宻者義也與道相宻者義也盖不道則義不能容不義則道不能容仁義者所樂同或作自名或作召也能同或作因所樂無形通及三皇而西域之學有喝佛罵祖者豈近是乎調味章色正聲以定天地人事三者畢此矣其道如上所謂則天地人事豈有出於此乎泰録第十一人論泰鴻之内出觀神明之外定制泰一之之言中也無所出入為定以為物稽入而論㤗鴻之内出而觀神明之外定而制㤗一之使物取稽焉天有九鴻拾遺記曰望三壺如聚米視八鴻若縈帶說者以為八鴻八方之名鴻鴻大也然則九鴻盖九方歟地有九州此即鄒子所謂九州盖非禹别者也泰一之道九皇之傅請成於泰始之末泰一之道至矣故上篇云九皇受傅以索其然之所生而今此又言其嘗請成於泰始盖非㤗始莫足以知焉其曰末者言順下風而請也見不或無不字詳事於名理之外此言見其事之畧而巳更當要其㑹歸故下文云范無形嘗無味以要名理之所㑹范者味之正也范者形也正如覆怨其正之正盖形受養於味者也味者氣之父母也氣不足之以精精不足之以味精或作清微者天地之始或作所治也言形言味而又言此者盖將要名理之所㑹又當致此三者也不或無不字見形臠而天下歸羙焉臠肉也名尸神明者大道是或作正也夫錯行合意扶義本仁或作收積順之所成先聖之所生也行其道者有其名爲其事者有其功此言仁義之治故行其道者有其名爲其事者有其功若夫聖人無名神人無功乗於道徳而逰乎萬物之上財豈局於仁義之域㢤故下文云故天地成於元或作無氣萬物乗於天地元氣太虗也太虗含天地天地含萬物故其言如此神聖乗或作秉於道徳南華所謂無訾無譽一龍一蛇者也以䆒其理或云萬物乗於聖秉於道徳以救其聖神以究天地萬物之理上聖皇天者先聖之所威立有命也堯舜三代誥命未嘗不稱天者盖以威立命而巳若夫致治之自則豈可以取頼於天㢤是在我者也此紂之矯誣上帝而無益於亂故下文云故致治之自在巳者也招高者髙招者此言治之汙顧我所以招之如何未有囿於管晏之卑而可以招堯舜之高者也故成形而不變者度也未離巳而在彼者狎漚也如狎漚者心動於内則漚鳥舞而不下此未離巳而在彼者也陳體立節萬世不易天地之位也分物紀或作他名文聖明别神聖之齊也齊如齊量之齊法天居地去方錯圎或作督方以智則滯圓而神則通神聖之鑒也說名物擬之者也議之者說也成功遂事彰不相離神聖之教不即不離而至妙之所㑹者更麤至高之所適者反下顯豈相離㢤神聖之教也天一位地一位聖人參於两間以齊齊之而以彼鑒此以此教彼則天下之理得矣然後萬物各遂其生故下文云故流分而神生流分謂水也天一生水其於物爲精精聚而後神從之動登而明生動登謂火也地二生火其於物爲神神㑹而後識從之明見而形成形成而功存故文者所以分物也理者所以紀或作地名也天地者同事而異域者也天域於上地域於下無規圎者天之文也無矩方者地之理也天循文以動地循理以作者也二端或作聖端者神之法也神明之法如是而巳神聖之人后或作命先天地而尊者也後天地生然知天地之始先天地亡然知天地之終道包之故能知度之其道圍乎天地之外故知能知之義能度之尊重焉故能改動或無動字之㧞隂陽移寒暑敏或作數亦或作明焉故能制斷之精神者物之貴大者也精神之外皆其緒餘土苴者也内聖者或作聖内精神之原也外王者皆其緒餘土苴則内聖者精神之原也莫貴焉故靡不仰制焉制者所以衛精擢神致氣也精欲嗇神欲養氣欲專故其辭如此擢者秀㧞之辭幽則不蕳或作聞則不煩不煩則精明逹明太用則昏精太用則竭故能役賢能使神明無為也故能用天下而有餘百化隨而變終始從而豫豫暇豫也神明者積精微全粹之所成也聖道神方或作万要之極也要其㑹歸至於此而極矣帝制神化治之期也至矣盡矣不可以有加矣故師或無師字為君而學為臣教者為君學者為臣上賢為天子次賢為三公髙為諸侯髙者以為諸侯易姓而王不以祖或作禮籍為君者欲同一善之安也堯授舜授禹用此道也彼天地動作於胷中然後事成於外萬物出入焉然後或作然同生物無害聖人心外無法而氣合於神神合於無天地之大萬物之多動作出入反在於胷中則事豈有不成物豈有不利㢤闓闔四時引移隂陽怨没澄物疑天下以爲自然百姓謂我自然是也此神聖之所以絶衆也子貢曰仲尼天也不可階而升也聖原神文有驗而不可見者也有情有性無爲無形故過人可見絶人未逺也南華曰南行者至於郢北靣而不見山是何也則去之逺矣神明所以合者也故神明錮結其紘紘者取譬於冠而錮結云者以明無危墮之患也生成用一不窮或作用不窮一所謂仲尼神明也小以成小大以成大至於山川鳥獸草木如也影則隨形響則或作明應聲故形聲者天地之師也隨而應之故曰師也四時之功隂陽不能獨爲也聖王者不失本末故神明終始焉輔相導隂陽終始四時之功卒令八風三光之變經或作氣不常之故孰不詔請或作緒都或作邵理焉都之爲言總也讀如都鄙之都此言人保聖人故隂陽失和詔而請之使總理焉雖然大亂之本實始於此此庚桑楚所以不釋於老聃之言故下文云故神靈威明上變光老聃所謂謂悖日月之明疾徐緩急中動氣老聃所謂中墮四時之施煞傷毁禍下在地或作徴下在地老聃所謂下爍山川之精故天地隂陽之受命取於神明之効旣巳見矣其効如上所謂亦巳見矣雖然豈遂可以無聖人之治㢤故下文云天者氣之所總出也所謂虹霓也霜露也風也積氣之成乎天者也地者理之必然或作理然之必也無可無不可者天道也地道則取必焉故聖人者出之於天其道常出於天之於地不肯出於地也在天地若隂陽或無陽字者杜燥濕以法義與時遷焉或無焉字若隂者以法義杜燥若陽者以法義杜濕度萬云神濕則天不生水形燥則地不生火二者聖人或無人字存則治亡則亂者天失其文地失其理也以是或作文知先靈先靈先王之靈王百神者上徳執大道凡此者物之長也及或作乃至乎祖籍之世代之君身雖不賢然南面稱寡猶不果亡者其能受教乎有道之士者也不然而能守宗廟存國家者未之有也鶡冠子卷中
