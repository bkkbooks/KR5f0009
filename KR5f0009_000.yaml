body:
  text: 鶡冠子序顛十韓子曰鶡冠子十有六篇其詞雜黄老刑名其博選篇四稽五至之說當矣使其人遇其時援其道而施於國家功德豈少哉學問篇稱賤生於無所用中流失船一壺千金者余三讀其辭而悲之文字脫繆爲之正三十有五字乙者三减者二十有二注十有二字云陸子曰鶡冠子楚人也居於深山以鶡爲冠號曰鶡冠子其道踳駁著書初本黄老而末流迪於刑名傳曰申韓厲名實切事情其極慘礉少恩而原於道德之意蓋學之弊有如此者也故曰孔墨之後儒分爲八墨離爲三嗚呼可不慎哉此書雖雜黄老刑名而要其宿時若散亂而無家者然其奇言奥旨亦每每而有也自博選篇至武靈王問凡十有九篇而退之讀此云十有六篇者非全書也今其書雖具在然文字脫繆不可考者多矣語曰書三寫魚成魯帝成虎豈虚言哉余竊閔之故爲釋其可知者而其不可考者輙疑焉以俟博洽君子
