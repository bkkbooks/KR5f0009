body:
  text: 陸佃解博選第一王鈇非一世之器者厚德隆俊也王鈇法制也賈子曰權勢法制人主之斤斧夫專任法制不以厚德將之而欲以持久難哉道凡四稽一曰天二曰地三曰人四曰命命者所以令之權人有五至一曰伯已百於己者二曰什已十於已者三曰若己與己等也四曰厮役事我者也五曰徒隸又其下者所謂天者物理情者也道無所治有之者以稽於天所以爾也教者地事也治者天事也所謂地者常弗一作不去者也道無所住有之者以稽於地所以爾也運者天道也處者地道也所謂人者惡死樂生者也所謂命者靡不在君者也莫不聽之之謂命君也者端神明者也無為而尊神明者以人為本者也因人則逸任已則勞人者以賢聖為本者也賢聖者以博選為本者也舜發於畎畝傅說舉於版築膠鬲舉於魚鹽管夷吾舉於士孫叔敖舉於海百里奚舉於市然則選士之路豈可不博哉博選者以五至為本者也故北面而事之則伯已者至北面事之所謂承之者也先趨而後息先問而後默則什己者至先人而趨後人而息先人而問後人而默雖亦降己異乎承之者也是以伯己者往什己者來人趨己趨則若己者至人趨己趨與之雁行者也憑几據杖指麾而使則厮役者至坐則憑几立則據杖指麾而使尚為有禮焉咄則徒隸之人至矣一作者也樂則一之苦則咄之不禮甚矣苟非無恥之人豈所甘心哉故帝者與師處王者與友處亡主與徒處故德萬一作百人者謂之雋雋者知哲聖人之謂也德千人者謂之豪此以獸之豪制名也德百一作萬人者謂之英此以草之英制名也毛詩傳曰萬人曰英記曰五人曰茂十人曰選百人曰俊千人曰英今此又以萬人曰俊百人曰英蓋莫可考合人物志曰獸之特者為雄草之秀者為英韓信是雄張良是英此言近之德音者所謂聲也未聞音出而響過其聲者也貴者有知富者有財貧者有身無知也故賤無財也故貧所有者特天地之委形而已總括百骸謂之身衆象備見謂之形信符不合事舉不成一本云舉事不成不死不生不斷不成常騎兩可之地豈足以就其斷哉計功而償權德而言王鈇在此孰能使營著希第二道有稽以道為决德有據以德為驗人主不聞要故專一作常與運堯而無以無以下一有自字見也道與德館而無以命也羲不當格而無以更也攘雞紾兄之類是已格正也凡此以不聞要而己然則人主豈可以不知務哉放飯流歇而問無齒决亦無益於事也若是置之雖安非定也言幸安也夫抱火厝之積薪之下而寢卧其上雖未及然終亦必運而已矣端倚有位名號弗去言其違道遠矣所存者名號而矣故希人者無悖其情希世者無繆其賓方是之時俯而徇俗仰以阿時者至矣文禮之野與禽獸同則羔雁雖有跪乳行列之儀而以人文格之野心多矣又況無羔雁之性者奈何同之乎言語之暴與蠻夷同謂蠻夷舌者也夫君子者易親而難狎畏禍而難却死義故難却也嗜利而不為非義然後取時動而不苟作不得已而後起體雖安之而弗敢處然後禮生君子克己復禮蓋充此而巳心雖欲之而弗敢信然後義生一作立信猶任也君子克己就義蓋充此而已夫義節欲而治禮反情而辨者也故君子弗徑情而行也夫亂世者以粗知為造意造意微矣豈粗智之所能知哉以中險為道司巇也以利為情若不相與同惡則不能相親相與同惡則有相憎小人難近如此說者言仁則以為誣發於義則以為夸平心而直告之則有弗信利令智昏不可與明如此故賢者之於亂世也絶豫而無由通異類而無以告苦乎哉蓋傷之也賢人之潜亂世也上有隨君下無直辭君有驕行民多諱言故人乖其誠能士隱其實情心雖不說弗敢不譽楊雄羡新是已此非可以而不已者也夫雄如此而義不能繩墨者則以有道故也魯人曰柳下惠固可吾固不可孔子善之然則無雄之道浮沉濁世齷齪阿上而欲自比於雄亦已惑矣事業雖弗善不敢不力此汝墳之所勉者也雖非殷其雷之義亦其所遇不得不爾也趨舍雖不合不敢弗從夫在我者皆彼之所不能易則雖譽所不譽力所不力從所不從亦應世之道也故觀賢人之於亂世也一作者其慎勿慎勿一作順物以為定情也凡此所為亂群焉耳姑以遠害而已豈真同也哉夜行第三天文也地理也月刑也陰以刻制日德也陽以昭蘇四時檢也有明法而不議度數節也天地之節蓋有度數存焉陰陽氣也五行業也五材也在地成形故曰業五政道也五辰也在天成象故曰道五音調也聲成文變成方謂之音斯之謂調五聲故也五聲因習而異在齊而齊言居晋而晋語斯之謂故五味事也賞罰約也賞所以約之使赴功罰所以約之使辟咎此皆有驗有所以然者隨而不見其後迎而不見其首其所以然者道也道無首尾而欲從迹其所為譬如捕風逆之無前從之無後此雖顔子恍然不能定也又况賜之流乎成功遂事莫知其狀夫孰知之圖弗能載名弗能舉夫巧者不能畫則辨者亦不能言矣强為之說曰芴乎芒乎中有象乎芒乎芴乎中有物乎芒者似有芴者似無窅乎冥乎中有精乎致信究情夫道有情有信非若斷空雖無形而非理也要在致而究之復反無貌貌且無之况於形乎鬼見一本作鬼不能見不能為人業露則不神豈足以建功立事哉故善為人業者微矣妙矣雖鬼不能窺其密也故聖人貴夜行天則第四聖王者有聽決疑之道能屏讒權實逆淫辭楊墨之屬絶流語管蔡之屬去無用屠龍之技刻楮之巧雖號高妙無所用之杜絶朋黨之門持祿養交背公死黨潝潝然患其上訿訿然思不稱乎上豈可開之嫉妬之人不得著明常置卑晦非君子術數之士莫得當前故邪弗能奸禍不能中彼天地之以無極者以守度量而不可濫此況邪弗能奸禍不能中之義日不踰辰日月所會為辰月宿其列言宿其辰之次也當名服事當箕之名服箕之事當斗之名服斗之事其他放此星守弗去各止分域弦望晦朔終始相巡一作選夫日陟降而成晦朔月虧盈而成弦望反復相尋如轉磨引鋸豈有終窮踰年纍歲年取禾之一熟而歲騎兩稔用或作肅不縵縵縵縵漫滅之貌此天之所柄以臨斗一作計者也言斗臨制四方運乎四時終古不忒而天道如上所謂更以臨之中參成位一本作伍一本作五言參天地而成位乎其中也四氣為政政法四時前張後極張南方之星也極北方之星也或言張或言極互相挾焉左角一作魯右𨱆一作越角東方之星也𨱆西方之星也參伐一曰鈇𨱆九文循理以省官衆小大畢舉此言簡而不遺也先無怨讎之患後無毁名敗行之咎故其威上際下交交元作校其澤四被而不鬲東漸西被朔南暨焉沛然莫之能禦也天之不違以不離一所謂趣物而不兩也天若離一反還為物天之所以異乎萬物者抱一而已字解曰一而大者天也二而小者示也不創不作與天地合德常輔萬物之自然而不敢為也天不創而萬物化地不作而萬物育節璽相信如月應日日循星而進退月應日以生死信之至也此聖人之所以宜世也知足以滑正略足以恬禍此危國之不可安亡國之不可存也强足以拒敵辨足以飾非此跖之所以不可救藥也故天道先貴覆者天道能覆覆者而已如其自絶雖天不可如何地道先貴載者地道能載載者而已如其自棄雖地不可如何人道先貴事者柳下季曰子不聽父之詔弟不受兄之教雖今先生之辨將奈之何哉酒亦或作借保先貴食者酒保貨酒者也此申天貴覆者地貴載者人貴事者之況也待物也領或作顧氣時也四時各領一方之氣生殺法也循度以斷天之節也物不可以終通故循度以間之性命自然之節也𠛱地而守之分民而部之守或作止此聖人法天之節循度以斷之故地各有守民各有部寒者得衣飢者得食冤者得理勞者得息聖人之所期也夫裁衣而知擇其工裁國而知索其人此固世之所公哉一作或譬之製錦而使人學裁者末之有也同而後可以見天天道一而不二故自其同者視之夷貉一家也異而後可以見人人道二而不一故自其異者視之肝膽楚越也變而後可以見時常運而不停化而後可以見道庚桑子曰越雞不能伏鵠卵魯雞固能矣趎往南見老子然則道之等級見矣臨利而後可以見信臨財而後可以見仁臨難而後可以見勇繁霜徑風然後可以别草木之真性臨事而後可以見術數之士九皇之制春秋緯云人皇兄弟九人分治天下九皇之號豈緣是歟主不虛王王德備矣臣不虛貴階級列等之爵無虛授也尊卑名號言卑尊其名號也自君吏民各君吏民次者無國入使治之歷寵歷録歷録文章之貌言更歷寵榮華焕如此毛詩傳曰楘歷録也副所以付授非特受封之臣不虛貴梯級雖無國者亦稱所以付授與天人參相結連天人一貫不可解也鉤考之具不備故也鉤考督責之術也言惟無督責之術而以道相化故能如是故曰燒之剔之刻之雒之馬之死者十二三矣夫馬之性固真矣然其智至於詭竊者伯樂之罪也雖然九皇之制亦寓言耳夫太上無法而治安有受封之制哉契理之士要其會歸而遺其所寄可也下之所逜逜之言干也上之可蔽斯其離人情而失天節者也緩則怠急則困見間一作門則以奇相御人之情也恆物之情緩之則怠急之則困故昔賢驅雞之喻戒在疾梌也間巇隙也方其鍵閉雖有奇計安得而抵之哉天節見上故於此具論人情舉以八極信焉而弗信天之則也八極八方之極四中四角是也淮南子曰八埏之外有八紘八紘之外有八極夫八極有之而以跡所不至更若誕謾故曰信焉而弗信也雖然以懸寓觀之八方上下無盡也亦無無盡無極也亦無無極故曰天之則也差謬一間言不可合孔墨之道同是堯舜同非桀紂而終不可合者其弊由此也平不中律小失聲韻則雖平不中律矣夫千里之失謬於毫釐而歷年之患誤在頃刻是故君子慎其小也月望而晨月毁於天珠蛤螺蚌虛于深渚水岐成渚上下同離也言同氣附離而無間雖貍物潜於深渚與月盛衰更如在上也淮南子曰日至而麋鹿解月死而螺蚌膲未令而知其為未使而知其往上不加務而民自盡此化之期也使而不往禁而不止上下乖謬者其道不相得也上紇下撫者遠衆之慝也陰陽不接者其理無從相及也算不相當者人不應上也符節亡此曷曾可合也為而無害成而不敗一人唱而萬人和如體之從心此政之期也蓋毋錦一作綿杠悉動者其要在一也蓋無錦杠而橑輻俱動者其要在杠故也是故明主好要以一倡萬以錦韜杠故謂之錦杠爾雅曰素錦韜杠未見不得其𧦽而能除其疾也文武交用而不得事實者法令放而無以梟之謂也梟斬刑也此言法令不行小人敢為負謾而無忌憚也雖然秦以苛察相高其弊徒文具耳而至於土崩更甚乎無法者無惻怛之實故也由是觀之內無至誠惻怛之實欲以一切從事於法則將以考真也適足以起僞將以稽治也適足以招亂舍此而按之彼者曷曾可得也南適而北轅矣冥言易而如言難言之不作為之也難故父不能得之於子而君弗能得之於臣踐言之行雖在君臣父子之間如此況卑賤乎已見天之所以信於物矣無妄天之道也未見人之所信於物也不能似言捐物任勢者天也萬物盡無因任而已捐物任勢捐或作損故莫能宰而不夭一本作得先之在古者道之理也損物任勢故莫能宰而不夭其道如上故莫能宰之而莫不夭焉夫物故曲可改人可使言苟為物矣無以有已如此以明天之不可轉徙也法章物而不自許者天之道也夫法種種差别稽之天道豈得已哉姑以應世而已甚不自是也以為奉教陳忠之臣未足恃也此其勢必至於有法也故法者曲制曲為之制官備主用也官各守之以備主用舉善不以窅窅不以潜晦舉人之善必著見而後置之拾過不以冥冥不以隱匿拾人之過必發露而後廢之拾或作捨决此句法之所貴也若礱磨不用賜物雖詘有不效者矣言慶賞者勵世磨鈍之器也然而賞不能勸不勝罰不能必不可若砥礪不用之材而責有於無玉帛雖卒有不效者矣上下有間於是設防知蔽並起為之斗斛以量之則并與斗斛而竊之為之權衡以稱之則並與權衡而竊之故政在私家而弗能取政在大夫重人掉權而弗能止賞加無功而弗能奪法廢不奉而弗能立罰行於非其人而弗能絶者不與其民之故也與民共之而上下以道相維豈容至此哉屋漏知之在下船漏知之在上夫使百姓釋已而以上為心者教之所期也八極之舉不能時贊故可壅塞也所謂無障者四通六闢豈疑八極之舉而不能贊明哉湯之問棘是已昔者有道之取政非於耳目也神心恍惚俯仰之間再撫八極之外而里之前耳不能聞墻之外目不能見故聖人之政恃道而不恃耳目夫耳之主聽目之主明一葉蔽曰不見太山兩豆塞耳不聞雷霆膚寸之間小物足以障之何足恃哉道開而否未之聞也此明道之足恃也夫道開者雲霧不能礙其視雷霆不能亂其聽雖栖在蚊睫而視之若嵩峰之阿戰於蝸角而聽之若齊魏之關夫敦能否之見遺不掇非人情也言無是也此申未之聞也之况信情修一作循生非其天誅逆夫人僇一本作逆天之人僇不勝任也不畏天禍人殃死地隨之而將以修生此如戴粒之蟻欲以冠山何足以堪其任也為成求得者事之所期一作明也以為成功則天而得之不得曰有命者無所期焉是道也非事也為之以民道之要也民之所未安聖人不强行民之所未厭聖人不强去唯民知極弗之代一作伐也夫因人而不自任者天也民實知極聖人豈侵越而代之大司徒曰使民興賢出使長之使民興能人使治之此聖王授一作受業所以守制也彼一作被教苦故民行薄未至乎孩而始誰失之本故爭於末魚亡江湖而爭於濡沫人有分於處處有分於地各有分域地有分於天郢有天下天有分於時秦天早寒楚天早熱之類時有分於數春乘木數秋乘金數之類數有分於度取數多者修取數寡者促度有分於一一者度數之原隨所分而赴之譬之物焉一月普見衆水天居高而耳卑者此之謂也天體蓋高而其耳更卑者精神之運普遍萬物故也故聖王天時人之地之雅無牧能因一作用無功多夫文貫三為王蓋取諸此尊君卑臣非計親也任賢使能非與處也處故舊也言不以私恩廢天下之公義水火不相入天之制也水火以譬恩義蓋古之治天下者方其申至恩也公義不得奪方其申大義也私恩不得千猶之水火焉相濟而不相入也雖然凡此人道而已若夫天道則又不在此域也故下文云明不能照者所謂離朱索之而不得道弗能得也規不能包者力弗能挈也夫天地雖密移而真體常住非若舟壑夜半負之而去夫敦能挈之自知慧出慧出一作惠之使玉化為環玦者是政反為滑也璞玉不毁孰為環玦玦半環也禮論曰絶人以玦反絶以環田不因地形不能成穀稻宜下地黍宜上地為化不因民不能成俗嚴疾過也喜怒適也四者已仞非師術也此言四者或過或適雖殊而遠離大道一也豈足以據師之席哉列子曰仞而有之皆感也形嗇元作薔一本作蓋而亂益者勢不相牧一作收也形無以牧乎勢勢無以牧乎形故其弊如此德與身存亡者未可以取法也堯舜殂落其骨蓋已朽久矣而至今詠歎不息者豈係其身之存亡哉此萬世之法也昔宥世者未有離天或無天字人而能善與國者也與或作為善與國所與之國夫天不人不因人不天不成而畸於天人則其身之不能治況與國乎先王之盛名未有非士之所立者也引而高之者天也過生於上罪死於下濁世之所以為俗也一人乎一人乎命之所極也此歡辭也言命至君而極矣今貽厲階如此可不惜哉蓋痛之彌深其辭益緩詩人之義也環流第五有一而有氣一者元氣之始有氣而有意意者沖氣所生有意而有圖可以象矣有圖而有名可以言矣有名而有形有形而有事有事而有約八者具矣而渾淪未離所謂混沌者也約决而時生時生或作時立决之為言判也時立而物生混沌開矣於是四時行焉百物生焉故氣相加而為時約相加而為期期相加而為功功相加而為得失得失相加而為吉凶萬物相加而為勝敗莫不發於氣氣所以發之通於道道所以通之約於事知道已而則蕩正於時知事而已則差離或作雜於名離如附離之離成於法者也法之在此者謂之近其出化彼謂之遠近而至故謂之神明之在道者為神神之在器者為眀遠而反故謂之明老子所謂逝曰遠遠曰反明者在此其光照或作昭彼其事形此其功成彼鄁詩曰執轡如組蓋言此矣夫為組者總紕於此成文於彼言其動於近行於遠也孔子曰為此詩者其知政乎執此法以御民豈有不化哉干旄之忠告至矣從此化彼者法也生法者我也非我則無法成法者彼也非彼則無所用法生法者日在而不厭者也精神之運隨日以新生成在已謂之聖人彼我玄同盛德之至惟聖人究道之情唯道之法非真混沌敦能如此公政以明斗柄東指天下皆春斗柄南指天下皆夏斗柄西指天下皆秋斗柄北指天下皆冬斗柄運於上事立於下斗柄指一方四塞俱或作皆成此道之用法也古之聖人不下席而天下治顔如渥丹肌膚若冰雪者用此道也而世之枯槁者昧此以為黃帝肌色皯黣而堯舜如臘此墨子之道也故日月不足以言明四時不足以言功言其明與功更在四時日月之上一為之法以成其業故莫不道民咸用之一之法立而萬物皆來屬以出於一故萬物不能二也法貴如言無信不立言者萬物之宗也是者法之所與親也非者法之所與離也是與法親故强非與法離故亡法不如言故亂其宗故生法者命也生於法者亦命也莫非命也命者自然者也莫能使之然亦莫能使之不然謂之自然命之所立賢不必得不肖不必失命曰彭祖之智不出堯舜之上而壽八百顔淵之才不出衆人之下而壽十八仲尼之德不出諸侯之下而困於陳蔡殷紂之行不出三仁之上而居君位蓋言此矣命者挈己之文一作父者也夫身在草萊而挈之浮榮之上者命也然而俯仰百年恍然如夢是文也非實也故有一日之命有一年之命有一時之命有終身之命終身之命無時成者也故命無所不在無所不施或作絶無所不及言無適而無有命也時或後而得之命也既有時有命時者天之運命者天之令南華曰諱窮久矣而不免命也求通久矣而不得時也引其聲合之名其得時者成命日調引其聲合之名其失時者精神俱亡命日乖夫嚬其里一也而醜人獻之更增其陋時命者唯聖人而後能决之南華曰知通之有時知窮之有命臨大難而不懼者聖人之勇也夫先王之道備然而世有困君或作居其夫之謂者也禮義法度應時而變時命不停法亦隨故而昧者膠柱刻舟守先王之腐餘其道雖備而祇益困窮此猶枕卧芻狗而更以遭魘豈易怛也哉故所謂道者無己無己元作己無者也隨之而已所謂德者能得人者也亦不失已道德之法萬物取業所謂資而不匱者也無形有分名曰大孰或作敦不知其誰之子也故東西南北之道踹一作端然其為分等也南華曰知東西之相反而不可以相無則功分定矣陰陽不同氣然其為和同也酸鹹甘苦之味相反然其為善均也南華曰相梨橘柚其味相反而皆可於口五色不同采然其為好齊也五聲不同均然其可喜一也凡此五者以譬先王之道不矜於同而矜於治故物無非類者動靜無非氣者是故有人將一本作一人將一人之將得一人氣吉有家將一家之將得一家氣吉有國將將一國者得一國氣吉古人有言戰猶博也錢多則氣豪而勝資少則心去而輸然則將之吉凶在氣兵法曰朝氣蛻晝氣隋暮氣歸善用兵者避其蛻氣擊其隋歸其將一本將字下有失字凶者反此故同之謂一異之謂道相勝之謂執吉凶之謂成敗賢一本賢字上有故字者萬舉而一失不肖者萬舉而一得其冀或作共善一也然則其所以為者不可一也知一之不可一也故貴道異之謂道空之謂一空一作同萬物莫不無無不備之謂道萬物莫不有立之謂氣通之謂類氣之害人者謂之不適味之害人者謂之毒夫社夫社元作天社或作天杜不㓨則不成霧或作霧氣㓨之為言猶曰達也此言亡國之社屋之不受天陽故無以成霧蓋大社不屋而壇以受霜露之氣然後霧生焉正言社與霧者社以申立之謂氣之義霧以申通之謂類之義氣故相利相害也太公調曰陰陽相照相蓋相治四時相代相生相殺類故相成相敗也夏者春之類冬者秋之類他皆放此積往生跂或作政工或作王以為師跂跛倚也師如師巫之師巫步多跛故積往生跂工以為師楊子曰昔者姒氏治水土而巫步多禹扁鵲盧人也而醫多盧積毒成藥工以為醫此言藥之迹起而醫生焉蓋天下之弊多緣故迹而生故大盜貸仁義以竊國小儒借詩禮而發家故曰焉知曾史不為桀跖之嗃矢也美惡相飾命曰復周物極則反命曰環流言其周流如環道端第六天者萬物所以得立也萬物待是而後存者天也地者萬物所以得安也天父道也地母道也故天定之地處之時發之物受之聖人象之夫寒溫之變非一精之所化也五精化氣然後寒暑成焉天下之事非一人之所能獨知也海水廣大非獨仰一川之流也堯十年九潦而水不為加益湯八年七旱而水不為加損是豈仰一川之鍾哉是以明主之治世也急於求人弗獨為也與人共之與天一作人與地亦與天地共之建立四維禮義廉恥謂之四維以輔國政鉤繩相布一作希銜橛相制參偶其備立位乃固經元作織氣有常理以天地動逆天時不祥有崇事不仕賢無功必敗出究其道入窮其變張軍衛外禍反在內所謂季孫之憂不在顓臾而在蕭墻之內也所備甚遠賊在所愛是以先王置士也舉賢用能無阿於世仁人居左春以生之象仁忠臣居前南方著見象忠義臣居右秋以成之象義聖人居後北方祕密象聖左法仁則春生殖前法忠則夏功立右法義則秋成熟後法聖則冬閉藏先王用之高而不墜安而不亡此萬物之本𦾑天地之門户本𦾑門户云者以結左仁右義前忠後聖而春生夏立秋成熟冬閉藏之義道德之益也此四大夫或無夫字者君之所取於外也君者天也左右前後共法四時故君象天焉天不開門户使下相害也東不法仁西不法義南不法忠北不法聖則天之門户塞矣進賢受上賞則下不相蔽修文殿御覽引鶡冠子曰進賢者受上賞則下不蔽善為政者賞之不多而民喜罰之不多而民畏此謂進既仕之賢者也不待事人賢士顯不蔽之功信雖非事人賢士而進之受賞則任事之臣勸矣故下文云則任事之人莫不盡忠繁露曰一中為志二之則為患鄉曲慕義邦國欣慕斯可知矣化坐自端羊肉不慕蟻蟻慕羶也故彼雖慕義而我之化坐自端化坐自端言恭已正南面而已此其道之所致德之所成也本出一人故謂之天無二上也莫不受命不可為名故謂之神妙萬物而為言也至神之極見之不忒一作或契此道者豈有差哉胸乖不惑務正一國災變之至無所怛惑姑以天下大理考正吾國之失而已豈曰天之有某變也以我為有某事而致也哉一國之刑具在於身刑于寡妻至于兄弟以御于家邦以身老一作考世以救於世而老正以錯國服義行仁以一王業夫仁者君之操也義者君之行也忠者君之政也信者君之教也聖人者君之師傳也君道知人臣術知事故臨貨分財使仁犯患應難使勇受言結辭使辨慮事定計使智理民處平使謙賓奏贊見使禮賓奏言擯贊見言詔記曰禮有擯詔樂有相步溫之至也用民獲衆使賢出封越境適絶國使信制天地御諸侯使聖因任之道此其大略也嘗試論之古之明王無為而用天下也豈特使仁使勇使辨使智使謙使禮使賢使信使聖哉雖天刑人憀之餘尚無棄者也故戚施直鎛蘧蒢蒙璆侏儒扶盧矇瞍修聲聾者司火眇者督繩劓者抱關刖者守囿嚚瘖跛躃以實裔土夫如是故上無遺事下無棄才三代之所以安且久者用此道也雖然知所使仁而不知其仁有大小知所使知而不知其智有遠近未可也故曰孟公綽以為趙魏老則優而不可以為滕薛大夫雍也可使南面赤也可使與賓客言也求也百乘之家可使為之宰也由也千乘之國可使治其賦也由是觀之則此書所云亦因任之大凡而已莊子曰因任已明而原省次之因任如此然後可以原省故下文云夫仁之功善與不爭下不怨上辨士之功釋怨解難智士之功事至而治難至而應忠臣之功正言直行矯拂王過義臣之功存亡繼絶救弱誅暴信臣之功正不易言貞謙之功廢私立公韓非子曰自營為某背私為公禮臣之功尊君卑臣賢士之功敵國憚之四境不侵聖人之功定制於冥冥求至欲得言聽行從近親遠附明達四通由是而上至於冥冥聖人之任也內有挾度操以為驗所謂道揆者是也然後有以一本無然以二字量人無節於內觀物弗之察矣富者觀其所豫足以知仁貴者觀其所舉足以知忠觀其大𥘽或作伴亦或作祥長不讓少貴不讓賤足以知禮達或作迭觀其所不行足以知義受官任治觀其去就足以知智迫之不懼足以知勇口利辭巧足以知辨使之不隱足以知信貧者觀其所不取足以知廉賤者觀其所不為足以知賢測深觀天足以知聖困任原省之要在於知人而知人在於有以觀之孔子曰視其所以觀其所由察其所安人焉瘦哉故此又具論之第不失次理不相舛一本作奸一本作拿近塞遠閉備元變成元者備之所以不困成者變之所以不倦眀事知分度數獨行無道之君任用么麼么麼一作幼歷么麼細人俊雄之反動即煩濁有道之君任用俊雄動則明白二者先定素立白篸立白篸一本作七一日藻藻一作慕明起白蔘於下明起於上蔘垂藐也氣榮相宰君臣同體之況言氣不言血言榮不言衛相備也上合其符下稽其實時君一作貧意生期待時而發夫賢士之居邑里也合哉而難同而殊知時日時君元作時日遇人有德一作隱君子至門不言而信萬民附親遇人暴驕萬民離流上下相疑復而如環一作不環日夜相撓諫者弗受言者危身無從聞過故大臣僞而不忠是以為人君親其民如子者弗召自來靈臺之效是矣故曰有光卒於美名不施而責弗受或作愛而求親故曰有殃卒於不祥夫長者之事其君也調而和一作知之士於純一作屯厚士如勿士行枚之士引而化之天下好或作如之其道日從故卒必昌夫小人之事其君也務蔽其明塞其聽乘其威以灼熱人倚上之威作人寒燠天下惡之其崇日凶故卒必敗禍及族人此君臣之變治亂之分興壞之關梁國家之閲也閲猶監也逆順利害由此出生凡可無學而能者唯息與食也故先王傳或作博道先王一作先生以相效屬也賢君循成法後世久長隋君不從當世滅亡禹之法猶存而夏不世王者由是故也近迭第七龐子問鶡冠子曰聖人之道何先鶡冠子曰先人龐子曰人道何先鶡冠子曰先兵龐子曰何以舍天而先人乎鶡冠子曰天高而難知有福不可請有禍不可避法天則戾地廣大深厚多利一作則而鮮威天尊而不親地親不不尊法地則辱時舉錯代更無一法時則二三者不可以立化樹俗故聖人弗法龐子曰陰陽何若鶡冠子曰神靈威明與天合神之精明曰靈勾萌動作與地俱屈生曰勾陰陽寒暑與時至三者聖人存則治亡則亂是故先人富則驕貴則羸兵者百歲不一用然不可一日忘也是故人道先兵龐子曰先兵奈何鶡冠子曰兵者禮義忠信也龐子曰願聞兵義鶡冠子曰失道故敢以賤逆貴不義故敢以小侵大龐子曰用之奈何鶡冠子曰行枉則禁反正則舍是故不殺降人鷹不擊伏況於人乎主道所高莫貴約束得地失信聖王弗據倍言負約各將有故龐子曰弟子聞之曰地大者國實民衆者兵强兵强者先得意於天下今以所見合一本作含所不見蓋殆一本作係一本作治不然今大國之兵反詘而辭窮禁不止令不行之故何也令使為之禁使勿為也鶡冠子曰欲知來者察往欲知古者察今擇人而用之者王用人而擇之者亡逆節之所生不肖侵賢命曰凌下凌上也百姓不敢言命曰勝上勝下也今者所問子慎勿言夫地大國富民衆兵强曰足士有餘力而不能以先得志於天下者其君不賢而行驕溢也己亢為驕己滿為溢不賢則不能無為而不可與致為孟子曰人有不為也然後可以有為驕則輕敵輕敵則與所私謀其所不知為句使非其任力欲取勝於非其敵不計終身之患樂須臾之說是故國君被過聽之謗醜於天下而謀巨負濫監首之責于敵國敵國乃責則却或作劫以辭郤之却則說者羞其弱以辭郤之則說而責之者羞其弱矣其勢必至於用兵萬賤之直不能撓一貴之曲其在下者又無以回之國被伸或作神創浸大曰伸其發則戰其創之發則戰戰則是使元元之民往死邪臣之失朿音策也過生於上罪死於下讎既外結諸侯畜其罪則或作責危覆社稷世主懾懼寒心孤立不伐伐或作代下有威字此人二國之難不解君立不復悔曩或作晨郵過謀徙計易濫一作監首不足蓋以纍重濫為謀首其過重矣而一人之手豈足以障天下之目哉滅門殘族滅門周官所謂屋誅公謝天下以讓敵國不然則戰道不絶國創不息謂之伸創以此故也大或作天乎哉夫弗知之害以言弗知之害大矣悲乎哉其禍之所極以言其禍可悲也已此倚貴離道少人自有之咎也多己少人是故師未發軔而兵可迭也近迭名篇蓋取諸此今大國之君不聞一作間先聖之道而易事羣臣無明佐之大數而有滑正之碎或無碎字智反義而行之逆德以將之兵詘而辭窮令不行禁不止又奚足怪或作恃哉龐子曰何若滑正之智鶡冠子曰法度無以嚖一本作遂意為摸嚖讀為嚖彼小星之嚖聖人按數循法尚有不全是故人不百其法者不能為天下主今無數而自因無法而自備循無上聖之或作聖人檢而斷於己明斷以獨見之明人事雖備將尚何以復百己之身乎夫百己者豈獨彼有之蓋人受天地之中以生形體保神而衆妙悉備據今言之其身蓋有千百於己者然而所知才止一二而卒於泯沒無間者不能復之而已主知不明以貴或作責為道以意為法牽或作牢或作罕時誑一作詎或作拒世逜下蔽上使事兩乖兩失之矣養非長失以靜為擾以安為危百姓家困人怨禍孰大焉若此者北走之日軍敗曰北后知命亡投死之地久矣乃今知之龐子曰以人事百法一本法字在書字下奈何鶡冠子曰蒼頡作法蒼頡黃帝之史初見鳥獸蹄迒之迹始造書契書從甲子日始於甲辰始於子成史李官成史蓋以獄成告於正者李官士師也蒼頡不道然非蒼頡文墨不起蒼雖造書不道士史然而文墨之萌由是起矣此百法之端也縱法之載於圖者其於以喻心達意揚道之所謂乃才或作𡤎居曼曼作受之十分一耳此言使無文墨而欲以其法盡之於圖豈能盡其意之詳哉蓋自後世觀之書以趣便篆不如隸隸不如草則圖之鈍於應務可知矣故曰彌綸天下之事記久明遠著湣湣傳忞忞者莫如書湣湣目所不見忞忞心所不了故知百法者桀雄也若或作𠫤隔無形將然未有者知萬人也此俊德也非特桀雄而已故其知與人隔此三境而超萬人之上也將然不如無形無形不如未有取譬言之若太易者未有也而太初無形渾淪則將然矣無萬人之智者智不能棲世學之上龐子曰得奉嚴教受業有間或作聞矣退師謀言弟子愈恐鶡冠子卷上
